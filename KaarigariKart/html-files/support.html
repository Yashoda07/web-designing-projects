<div style="text-align:center; margin-top:40px;">
<h2 style="font-family:'lucida handwriting', cursive; color:#d63384; font-size:30px;"> Support Portal</h2>
<p style="font-size:18px; color:#5a005a;">You can collaborate, donate, or share ideas with us to uplift hidden artistic gems!</p>

<form style="display:inline-block; text-align:left; padding:25px; background-color:#ffe6f0; border-radius:10px; 
border:2px solid #e6e6fa; box-shadow:0 4px 8px rgba(0,0,0,0.1); margin-top:20px;">

<label for="name" style="font-weight:bold;">Your Name:</label><br>
<input type="text" id="name" name="name" required style="width:100%; padding:8px; margin-bottom:15px; border-radius:5px;"><br>

<label for="email" style="font-weight:bold;">Email:</label><br>
<input type="email" id="email" name="email" required style="width:100%; padding:8px; margin-bottom:15px; border-radius:5px;"><br>

<label for="type" style="font-weight:bold;">I want to:</label><br>
<select id="type" name="type" style="width:100%; padding:8px; margin-bottom:15px; border-radius:5px;">
  <option>Collaborate with KarigariKart</option>
  <option>Donate to Underrated Artisans</option>
  <option>Partner with an Artisan</option>
  <option>Offer Ideas/Suggestions</option>
</select><br>

<label for="message" style="font-weight:bold;">Your Message:</label><br>
<textarea id="message" name="message" rows="5" required style="width:100%; padding:8px; margin-bottom:15px; border-radius:5px;"></textarea><br>

<input type="submit" value="Submit Support Request" style="background-color:#ff69b4; color:white; font-weight:bold; padding:10px 20px; 
border:none; border-radius:5px; cursor:pointer;">

</form>
</div>
